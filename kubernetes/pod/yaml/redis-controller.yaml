apiVersion: v1
kind: ReplicationController
metadata:
  name: redis
  labels:
    app: redis
spec:
  replicas: 2
  selector:
    name: redis
  template:
    metadata:
      labels:
        name: redis
    spec:
      containers:
      - name: redis
        image: docker.m.daocloud.io/redis:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 6379
      nodeSelector:
        zone: north