apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluentd-ds
  namespace: kube-system
  labels:
    app: fluentd
spec: 
  selector:
    matchLabels:
      app: fluentd
  template:
    metadata:
      namespace: kube-system
      labels:
        app: fluentd
    spec:
      containers:
      - name: fluentd
        image: docker.m.daocloud.io/fluentd:latest
        imagePullPolicy: IfNotPresent
        resources:
          limits:
            memory: "200Mi"
            cpu: "100m"
          requests:
            memory: "100Mi"
            cpu: "50m"
        volumeMounts:
        - name: varlog  
          mountPath: /var/log
          readOnly: false
        - name: varlibdockercontainers
          mountPath: /var/lib/docker/containers
          readOnly: false
      volumes:
      - name: varlog
        hostPath: 
          path: /var/log
      - name: varlibdockercontainers
        hostPath: 
          path: /var/lib/docker/containers
