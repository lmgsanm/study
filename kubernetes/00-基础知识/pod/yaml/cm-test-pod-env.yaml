apiVersion: v1
kind: Pod
metadata:
  name: cm-test-pod-envfrom
spec:
  containers:
  - name: cm-test-envfrom
    image: docker.m.daocloud.io/busybox:latest
    imagePullPolicy: IfNotPresent
    command: ["/bin/sh","-c","env|grep APP"]
    envFrom:
    - configMapRef:
        name: cm-appvars
  restartPolicy: Never