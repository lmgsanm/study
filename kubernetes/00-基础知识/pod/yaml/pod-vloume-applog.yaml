apiVersion: v1
kind: Pod
metadata:
  name: volume-pod
spec:
  containers:
  - name: tomcat
    image: docker.m.daocloud.io/tomcat:latest
    imagePullPolicy: IfNotPresent
    ports:
    - containerPort: 8080
    volumeMounts:
    - name: app-log
      mountPath: /usr/local/tomcat/logs
  - name: busybox
    image: docker.m.daocloud.io/busybox:latest
    imagePullPolicy: IfNotPresent
    command: ["sh","-c", "tail -f /logs/catalina*.log"]
    volumeMounts:
    - name: app-log
      mountPath: /logs
  volumes:
  - name: app-log
    emptyDir: {}
