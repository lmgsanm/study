
####
loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1  # 单实例，无副本
  ingester:
    chunk_idle_period: 1h
    chunk_retain_period: 30m
    max_transfer_retries: 0
  schemaConfig:
    configs:
      - from: 2024-01-01
        store: boltdb-shipper
        object_store: filesystem
        schema: v12
        index:
          prefix: index_
          period: 24h
  storageConfig:
    boltdb_shipper:
      active_index_directory: /data/loki/boltdb-shipper-active
      cache_location: /data/loki/boltdb-shipper-cache
      shared_store: filesystem
    filesystem:
      directory: /data/loki/chunks
  persistence:
    enabled: true
    size: 20Gi  # 小规模足够，可按需调整
    storageClassName:  # 填你的 StorageClass 名称
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

# 同时部署 Promtail（采集器）
promtail:
  enabled: true
  config:
    snippets:
      pipelineStages:
        - docker: {}
      scrapeConfigs:
        - job_name: kubernetes-pods
          kubernetes_sd_configs:
            - role: pod
          relabel_configs:
            - action: replace
              source_labels: [__meta_kubernetes_namespace]
              target_label: namespace
            - action: replace
              source_labels: [__meta_kubernetes_pod_name]
              target_label: pod
            - action: replace
              source_labels: [__meta_kubernetes_pod_container_name]
              target_label: container
            - replacement: /var/log/pods/*$1/*.log
              separator: /
              source_labels:
                - __meta_kubernetes_pod_uid
                - __meta_kubernetes_pod_container_name
              target_label: __path__
        # 采集宿主机系统日志
        - job_name: system-logs
          static_configs:
            - targets:
                - localhost
              labels:
                job: varlogs
                __path__: /var/log/*log
        # 采集 K8s 组件日志（如 kubelet）
        - job_name: k8s-components
          static_configs:
            - targets:
                - localhost
              labels:
                job: k8s
                __path__: /var/log/kube*.log
  extraVolumes:
    - name: varlog
      hostPath:
        path: /var/log
    - name: varlibdockercontainers
      hostPath:
        path: /var/lib/docker/containers
  extraVolumeMounts:
    - name: varlog
      mountPath: /var/log
      readOnly: true
    - name: varlibdockercontainers
      mountPath: /var/lib/docker/containers
      readOnly: true

# 禁用内置 Grafana（复用你已有的）
grafana:
  enabled: false
